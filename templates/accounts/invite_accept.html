<!DOCTYPE html>
<html lang="en">
<head>
  {% include "_head.html" %}
  <title>Accept invite - CREST</title>
</head>
<body>
  <div class="d-flex align-items-center justify-content-center flex-grow-1 p-4">
    <div class="card p-4" style="width: 24rem;">
      <h1 class="h4 mb-3">Create your account</h1>
      <p class="text-muted">Invited as {{ invite.email }}</p>
      {% if form.errors %}
        <div class="alert alert-danger">{{ form.errors }}</div>
      {% endif %}
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Choose a username</label>
          {{ form.username }}
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          {{ form.password1 }}
        </div>
        <div class="mb-3">
          <label class="form-label">Confirm password</label>
          {{ form.password2 }}
        </div>
        <button type="submit" class="btn btn-primary w-100">Create account</button>
      </form>
    </div>
  </div>
</body>
</html>
