<!DOCTYPE html>
<html lang="en">
<head>
  {% include "_head.html" %}
  <title>Manage - CREST</title>
</head>
<body class="{% if theme == 'light' %}theme-light{% endif %}">

{% include "_navbar.html" %}

<main class="container pb-5">
  <h1 class="h4 mb-4"><i class="bi bi-sliders me-2"></i>Manage</h1>

  <div class="row g-4">
    <div class="col-12 col-md-3" id="admin-tabs">
      <div class="mb-3">
        <div class="text-muted small text-uppercase fw-bold mb-1 px-1">My Account</div>
        <div class="list-group">
          <button class="list-group-item list-group-item-action" data-section="apiToken"><i class="bi bi-key me-2"></i>API Token</button>
        </div>
      </div>
      <div class="mb-3 d-none" id="manage-group-staff">
        <div class="text-muted small text-uppercase fw-bold mb-1 px-1">Manage</div>
        <div class="list-group">
          <button class="list-group-item list-group-item-action" data-section="attempts"><i class="bi bi-bar-chart me-2"></i>Attempts</button>
          <button class="list-group-item list-group-item-action" data-section="gradeScales"><i class="bi bi-patch-check me-2"></i>Grade Scales</button>
          <button class="list-group-item list-group-item-action" data-section="sessions"><i class="bi bi-people-fill me-2"></i>Multiplayer Sessions</button>
          <button class="list-group-item list-group-item-action" data-section="appSettings"><i class="bi bi-toggles me-2"></i>App Settings</button>
          <button class="list-group-item list-group-item-action" data-section="users"><i class="bi bi-people me-2"></i>Users</button>
          <button class="list-group-item list-group-item-action" data-section="groups"><i class="bi bi-person-badge me-2"></i>Groups</button>
          <button class="list-group-item list-group-item-action" data-section="invites"><i class="bi bi-envelope-paper me-2"></i>Invites</button>
          <button class="list-group-item list-group-item-action" data-section="emailSettings"><i class="bi bi-envelope-gear me-2"></i>Email Settings</button>
          <a href="/api/docs/" target="_blank" rel="noopener" class="list-group-item list-group-item-action"><i class="bi bi-code-slash me-2"></i>API Docs</a>
          <a href="/admin/" target="_blank" class="list-group-item list-group-item-action"><i class="bi bi-gear me-2"></i>Django Admin</a>
        </div>
      </div>
    </div>

    <div class="col-12 col-md-9">
      <div id="admin-breadcrumb" class="mb-3 d-none">
        <button class="btn btn-sm btn-outline-secondary" id="admin-back-btn"><i class="bi bi-arrow-left me-1"></i>Back</button>
        <span id="admin-breadcrumb-text" class="ms-2 text-muted"></span>
      </div>

      <div class="card">
        <div class="card-body p-4">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 id="admin-section-title" class="h5 mb-0"></h2>
            <div class="d-flex gap-2">
              <button id="admin-header-action-btn" class="btn btn-outline-secondary btn-sm d-none"></button>
              <button id="admin-create-btn" class="btn btn-primary btn-sm d-none"><i class="bi bi-plus-lg me-1"></i>Add</button>
            </div>
          </div>
          <div id="admin-content"></div>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- Create/edit form modal -->
<div class="modal fade" id="admin-form-modal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="admin-form-modal-title">Edit</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="admin-form-error" class="alert alert-danger d-none"></div>
        <form id="admin-form"></form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="admin-form-save">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- Attempt detail modal -->
<div class="modal fade" id="attempt-detail-modal" tabindex="-1">
  <div class="modal-dialog modal-xl modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="attempt-detail-title">Attempt Details</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="attempt-detail-body">
        <p class="text-muted">Loading…</p>
      </div>
      <div class="modal-footer flex-wrap gap-2">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Close</button>
        <button type="button" class="btn btn-outline-secondary d-none" id="attempt-export-missed-btn">
          <i class="bi bi-download me-1"></i>Export Missed CSV
        </button>
        <button type="button" class="btn btn-primary d-none" id="attempt-generate-exam-btn">
          <i class="bi bi-file-earmark-plus me-1"></i>Generate Missed Exam
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Delete confirmation modal -->
<div class="modal fade" id="admin-confirm-modal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-exclamation-triangle-fill me-2"></i>Confirm</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="admin-confirm-body">Are you sure?</div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-outline-danger" id="admin-confirm-confirm">Delete</button>
      </div>
    </div>
  </div>
</div>

{% include "_nav_mp.html" %}
{% load static %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'adminui/admin.js' %}"></script>
</body>
</html>
