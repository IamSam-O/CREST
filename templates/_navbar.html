<script>
(function(){
  const t = localStorage.getItem('crest-theme');
  document.body.classList.toggle('theme-light', t === 'light');
  document.addEventListener('DOMContentLoaded', function(){
    const icon = document.getElementById('theme-icon');
    if (icon) icon.className = `bi ${t === 'light' ? 'bi-moon-stars-fill' : 'bi-sun-fill'}`;
    document.getElementById('nav-theme-toggle')?.addEventListener('click', function(){
      const nowLight = document.body.classList.toggle('theme-light');
      localStorage.setItem('crest-theme', nowLight ? 'light' : 'dark');
      const ic = document.getElementById('theme-icon');
      if (ic) ic.className = `bi ${nowLight ? 'bi-moon-stars-fill' : 'bi-sun-fill'}`;
    });
  });
})();
</script>
<nav class="navbar navbar-dark mb-4">
  <div class="container d-flex justify-content-between align-items-center">
    <span class="navbar-brand mb-0 h1"><i class="bi bi-shield-fill me-2"></i>CREST <small class="d-none d-md-inline fw-normal opacity-75 fs-6">Collaborative Rich-text Exam Self-hosted Tool</small></span>
    <div class="d-flex gap-2 align-items-center">
      <button id="nav-theme-toggle" class="btn btn-outline-secondary btn-sm" title="Toggle theme">
        <i id="theme-icon" class="bi {% if theme == 'light' %}bi-moon-stars-fill{% else %}bi-sun-fill{% endif %}"></i>
      </button>
      {% for link in nav_links %}
      <a href="{{ link.url }}" {% if link.target %}target="{{ link.target }}"{% endif %} class="btn btn-outline-secondary btn-sm">
        <i class="bi {{ link.icon }} me-1"></i>{{ link.label }}
      </a>
      {% endfor %}
    </div>
  </div>
</nav>
