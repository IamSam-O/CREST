services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    image: ghcr.io/iamsam-o/crest:latest
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    env_file:
      - path: .env
        required: false
    environment:
      - DJANGO_CSRF_TRUSTED_ORIGINS
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
